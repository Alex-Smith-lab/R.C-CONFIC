<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.C Terminal Entry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandPurple: '#9333ea',
                        brandPurpleHover: '#a855f7',
                        darkBg: '#0b0b0c',
                        cardBg: '#121214',
                        inputBg: '#1a1a1e',
                        inputBorder: '#2a2a32'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0b0b0c;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-gray-200 p-4">

    <div class="w-full max-w-md bg-cardBg p-8 rounded-xl border border-inputBorder shadow-2xl">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black tracking-wider text-brandPurple uppercase mb-2">R.C TERMINAL ENTRY</h1>
            <p class="text-sm text-gray-400">Input secure session configuration credentials to unlock your workspace.</p>
        </div>

        <div id="feedbackAlert" class="hidden mb-6 p-4 rounded-lg text-sm font-medium border"></div>

        <form id="terminalLoginForm" onsubmit="handlePortalAuthentication(event)" class="space-y-6">
            
            <div>
                <label for="identityEmail" class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">
                    User Identity Email
                </label>
                <input 
                    type="email" 
                    id="identityEmail" 
                    required
                    placeholder="name@example.com"
                    class="w-full bg-inputBg border border-inputBorder rounded-lg px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-brandPurple transition-colors duration-200 text-base"
                >
            </div>

            <div>
                <label for="securityPassword" class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">
                    Security Password
                </label>
                <input 
                    type="password" 
                    id="securityPassword" 
                    required
                    placeholder="••••••••"
                    class="w-full bg-inputBg border border-inputBorder rounded-lg px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-brandPurple transition-colors duration-200 text-base tracking-widest"
                >
            </div>

            <div>
                <button 
                    type="submit"
                    class="w-full bg-brandPurple hover:bg-brandPurpleHover text-white font-bold py-3 px-6 rounded-lg uppercase tracking-wide transition-all duration-200 transform active:scale-[0.99] shadow-lg shadow-purple-900/20"
                >
                    Initialize Portal Connection
                </button>
            </div>
        </form>

        <div class="mt-8 text-center">
            <button 
                onclick="triggerCredentialsReset()" 
                class="text-xs text-gray-500 hover:text-brandPurple underline underline-offset-4 transition-colors duration-200"
            >
                Reset Credentials
            </button>
        </div>

    </div>

    <script>
        // 1. Lifecycle Hook: Setup initialization configs on window frame payload load
        window.addEventListener('DOMContentLoaded', () => {
            initializeDatabaseLayer();
        });

        /**
         * Verifies and configures persistent authentication structural storage maps.
         * Resolves first-time experience failure loops by seeding default structural parameters.
         */
        function initializeDatabaseLayer() {
            const registryExists = localStorage.getItem('rc_user_registry');
            
            if (!registryExists) {
                // First time initialize default profile credentials array mapping matrix
                const defaultRegistry = [
                    {
                        email: "antonymbali96@gmail.com",
                        password: "password123", // Replace with preferred default password structural sequence
                        clearance: 1,
                        role: "Admin"
                    }
                ];
                
                localStorage.setItem('rc_user_registry', JSON.stringify(defaultRegistry));
                console.log("System Notice: Local identity user registry successfully seeded for first-time session run.");
            }
        }

        /**
         * Evaluation wrapper executing submission checking routines against local authorization storage map.
         * @param {Event} event - Intercepted Form submission event vector framework.
         */
        function handlePortalAuthentication(event) {
            event.preventDefault();

            const emailInput = document.getElementById('identityEmail').value.trim().toLowerCase();
            const passwordInput = document.getElementById('securityPassword').value;
            const alertBox = document.getElementById('feedbackAlert');

            // Fetch current state registry arrays
            const registryData = localStorage.getItem('rc_user_registry');
            const users = registryData ? JSON.parse(registryData) : [];

            // Identity verification predicate check loop filter
            const authenticatedUser = users.find(user => 
                user.email.toLowerCase() === emailInput && user.password === passwordInput
            );

            if (authenticatedUser) {
                // Post authorization validation processing actions setup parameters
                showAlert("Access granted. Initializing operational workspace pipeline components...", "success");
                
                // Track active operational state session token indicators
                sessionStorage.setItem('activeSessionUser', JSON.stringify(authenticatedUser));

                // Context redirect loop routine mockup (Updates view frame to main workspace console context window)
                setTimeout(() => {
                    // Replace with actual dashboard window link route name context targeting configuration parameters
                    // e.g., window.location.href = 'workspace.html';
                    alert("Redirecting to R.C Target Sheets Workspace Console dashboard frame panel view context layout profile setup.");
                }, 1200);

            } else {
                // Failure mitigation callback processing engine triggers error block UI message panel indicators
                showAlert("Authentication validation match failure. Access denied.", "error");
            }
        }

        /**
         * Render layout helper component updating notifications framework feedback UI interface boxes dynamically.
         * @param {string} message - Notification string feedback literal data contents.
         * @param {'success' | 'error'} type - Severity class style configuration map key assignment.
         */
        function showAlert(message, type) {
            const alertBox = document.getElementById('feedbackAlert');
            alertBox.innerText = message;
            alertBox.classList.remove('hidden', 'bg-red-950/40', 'border-red-800', 'text-red-400', 'bg-green-950/40', 'border-green-800', 'text-green-400');

            if (type === 'error') {
                alertBox.classList.add('bg-red-950/40', 'border-red-800', 'text-red-400');
            } else {
                alertBox.classList.add('bg-green-950/40', 'border-green-800', 'text-green-400');
            }
        }

        /**
         * Emergency interface modifier allowing clean data restoration workflows directly inside local workspace instances.
         */
        function triggerCredentialsReset() {
            if (confirm("Are you sure you want to restore the authentication system mapping database registries to defaults? This clears custom items.")) {
                localStorage.removeItem('rc_user_registry');
                initializeDatabaseLayer();
                showAlert("System credentials have been restored to defaults. Identity: antonymbali96@gmail.com", "success");
            }
        }
    </script>
</body>
</html>
